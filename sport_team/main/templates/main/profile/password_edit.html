{% extends 'layout/basic.html' %}
{% load django_bootstrap5 %}
{% block title %}Зміна пароля{% endblock %}
{% block content %}
<h2>Зміна пароля користувача {{ user.username }}</h2>
<form method="post">
    {% csrf_token %}
    {% bootstrap_form form layout='horizontal' %}
    {% bootstrap_button 'Змінити пароль' %}
</form>
{% endblock %}
